@if (visible()) {
  <div [class]="overlayClasses()" role="dialog" aria-modal="true">
    <!-- Backdrop -->
    <div [class]="backdropClasses()" (click)="onMaskClick($event)"></div>

    <!-- Dialog -->
    <div #dialogContent [class]="dialogClasses()" [style]="dialogStyles()" role="document">
      <!-- Header -->
      <div
        class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700"
        [class.cursor-move]="draggable() && !isMaximized()"
        (mousedown)="onDragStart($event)"
      >
        @if (headerTemplate(); as template) {
          <ng-container [ngTemplateOutlet]="template" />
        } @else {
          <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
            {{ header() }}
          </h2>
        }

        <div class="flex items-center gap-1">
          @if (maximizable()) {
            <button
              type="button"
              class="p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-gray-200 dark:hover:bg-gray-800 transition-colors"
              (click)="toggleMaximize()"
              [attr.aria-label]="isMaximized() ? 'Minimize' : 'Maximize'"
            >
              <lucide-icon [img]="isMaximized() ? minimizeIcon : maximizeIcon" class="w-5 h-5" />
            </button>
          }

          @if (closable()) {
            <button
              type="button"
              class="p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-gray-200 dark:hover:bg-gray-800 transition-colors"
              (click)="close()"
              aria-label="Close"
            >
              <lucide-icon [img]="closeIcon" class="w-5 h-5" />
            </button>
          }
        </div>
      </div>

      <!-- Content -->
      <div class="flex-1 px-6 py-4 overflow-auto">
        <ng-content />
      </div>

      <!-- Footer -->
      @if (footerTemplate(); as template) {
        <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700">
          <ng-container [ngTemplateOutlet]="template" />
        </div>
      }
    </div>
  </div>
}
