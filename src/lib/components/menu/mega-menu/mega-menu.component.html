<nav [class]="containerClasses()">
  @for (item of model(); track item.label; let i = $index) {
    <div class="relative">
      <button
        type="button"
        class="flex items-center gap-2 px-4 py-3 text-gray-700 dark:text-gray-300 transition-colors"
        [class.opacity-50]="item.disabled"
        [class.cursor-not-allowed]="item.disabled"
        [class.cursor-pointer]="!item.disabled"
        [class.bg-gray-100]="isActive(i)"
        [class.dark:bg-gray-800]="isActive(i)"
        [class.hover:bg-gray-50]="!item.disabled && !isActive(i)"
        [class.dark:hover:bg-gray-800]="!item.disabled && !isActive(i)"
        [disabled]="item.disabled ?? false"
        (click)="toggleSubmenu(i, item)"
      >
        @if (item.icon) {
          <lucide-icon [img]="item.icon" class="w-4 h-4"></lucide-icon>
        }
        <span class="font-medium">{{ item.label }}</span>
        @if (item.items && item.items.length > 0) {
          <lucide-icon
            name="chevron-down"
            class="w-4 h-4 transition-transform"
            [class.rotate-180]="isActive(i)"
          ></lucide-icon>
        }
      </button>

      <!-- Mega Menu Panel -->
      @if (isActive(i) && item.items && item.items.length > 0) {
        <div
          class="absolute left-0 top-full z-50 mt-1 min-w-64 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg shadow-xl p-4"
        >
          <div
            class="grid gap-6"
            [style.grid-template-columns]="'repeat(' + item.items.length + ', minmax(200px, 1fr))'"
          >
            @for (column of item.items; track $index) {
              <div class="space-y-2">
                @for (subItem of column; track subItem.label) {
                  <button
                    type="button"
                    class="flex items-center gap-2 w-full px-3 py-2 text-left text-gray-700 dark:text-gray-300 rounded-md transition-colors"
                    [class.opacity-50]="subItem.disabled"
                    [class.cursor-not-allowed]="subItem.disabled"
                    [class.cursor-pointer]="!subItem.disabled"
                    [class.hover:bg-gray-100]="!subItem.disabled"
                    [class.dark:hover:bg-gray-800]="!subItem.disabled"
                    [disabled]="subItem.disabled ?? false"
                    (click)="handleSubItemClick(subItem, $event)"
                  >
                    @if (subItem.icon) {
                      <lucide-icon
                        [img]="subItem.icon"
                        class="w-4 h-4 text-gray-500 dark:text-gray-400"
                      ></lucide-icon>
                    }
                    <span>{{ subItem.label }}</span>
                  </button>
                }
              </div>
            }
          </div>
        </div>
      }
    </div>
  }
</nav>
