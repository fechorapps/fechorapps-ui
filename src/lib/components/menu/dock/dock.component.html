<div [class]="wrapperClasses()">
  <div [class]="containerClasses()">
    @for (item of model(); track item.label; let i = $index) {
      <button
        type="button"
        class="relative flex items-center justify-center w-12 h-12 rounded-xl transition-all duration-200 ease-out group"
        [class.opacity-50]="item.disabled"
        [class.cursor-not-allowed]="item.disabled"
        [class.cursor-pointer]="!item.disabled"
        [class.hover:bg-gray-100]="!item.disabled"
        [class.dark:hover:bg-gray-800]="!item.disabled"
        [style.transform]="'scale(' + getScale(i) + ')'"
        [disabled]="item.disabled ?? false"
        (click)="handleClick(item, $event)"
        (mouseenter)="handleMouseEnter(i)"
        (mouseleave)="handleMouseLeave()"
      >
        <lucide-icon
          [img]="item.icon"
          class="w-6 h-6 text-gray-700 dark:text-gray-300"
        ></lucide-icon>

        @if (item.badge) {
          <span
            class="absolute -top-1 -right-1 flex items-center justify-center min-w-5 h-5 px-1.5 text-xs font-medium text-white bg-red-500 rounded-full"
          >
            {{ item.badge }}
          </span>
        }

        <!-- Tooltip -->
        <span
          class="absolute left-1/2 -translate-x-1/2 -top-10 px-2 py-1 text-sm text-white bg-gray-900 dark:bg-gray-700 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none"
        >
          {{ item.label }}
        </span>
      </button>
    }
  </div>
</div>
