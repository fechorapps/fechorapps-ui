<div class="inline-block">
  @if (!src()) {
    <div class="flex items-center justify-center w-64 h-48 border-2 border-dashed border-border rounded-xl text-muted-foreground text-sm">
      No image provided
    </div>
  } @else {
    <div
      class="relative overflow-hidden rounded-xl border border-border bg-black/10 select-none"
      #container
      (mousemove)="onMouseMove($event)"
      (mouseup)="stopDrag()"
      (mouseleave)="stopDrag()"
    >
      <img #imgEl [src]="src()" class="block max-w-full" (load)="onImageLoad()" alt="Image to crop" />
      @if (imageLoaded()) {
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/40 pointer-events-none"></div>
        <!-- Crop box -->
        <div
          class="absolute border-2 border-white shadow-lg cursor-move"
          [style.left.px]="cropX()"
          [style.top.px]="cropY()"
          [style.width.px]="cropW()"
          [style.height.px]="cropH()"
          (mousedown)="startDrag($event)"
        >
          <!-- Clear the overlay inside crop box -->
          <div class="absolute inset-0 bg-transparent ring-2 ring-white/50"></div>
          <!-- Corner handles -->
          <div class="absolute -bottom-1.5 -right-1.5 w-3 h-3 bg-white rounded-full border border-gray-400"></div>
          <div class="absolute -top-1.5 -right-1.5 w-3 h-3 bg-white rounded-full border border-gray-400"></div>
          <div class="absolute -bottom-1.5 -left-1.5 w-3 h-3 bg-white rounded-full border border-gray-400"></div>
          <div class="absolute -top-1.5 -left-1.5 w-3 h-3 bg-white rounded-full border border-gray-400"></div>
        </div>
      }
    </div>
    <!-- Actions -->
    <div class="flex items-center justify-end gap-2 mt-2">
      <button
        (click)="cancelled.emit()"
        class="flex items-center gap-1.5 px-3 py-1.5 border border-border rounded-lg text-sm hover:bg-accent transition-colors"
      >
        <lucide-icon [img]="xIcon" [size]="14" />
        Cancel
      </button>
      <button
        (click)="crop()"
        [disabled]="!imageLoaded()"
        class="flex items-center gap-1.5 px-3 py-1.5 bg-primary text-primary-foreground rounded-lg text-sm hover:bg-primary/90 disabled:opacity-50 transition-colors"
      >
        <lucide-icon [img]="cropIcon" [size]="14" />
        Crop
      </button>
    </div>
  }
</div>
