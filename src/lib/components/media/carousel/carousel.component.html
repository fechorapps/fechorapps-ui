<div [class]="containerClasses()">
  <!-- Carousel Content -->
  <div class="overflow-hidden">
    <div
      class="flex transition-transform duration-500 ease-out"
      [style.transform]="'translateX(-' + currentPage() * (100 / numVisible()) * numScroll() + '%)'"
    >
      @for (item of value(); track $index) {
        <div class="flex-shrink-0 px-2" [style.width.%]="100 / numVisible()">
          <div class="h-full">
            <ng-content></ng-content>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- Navigation Buttons -->
  @if (showNavigators()) {
    <button
      type="button"
      class="absolute left-2 top-1/2 -translate-y-1/2 z-10 flex items-center justify-center w-10 h-10 rounded-full bg-white/90 dark:bg-gray-800/90 shadow-lg transition-all"
      [class.opacity-50]="!canGoPrev()"
      [class.cursor-not-allowed]="!canGoPrev()"
      [class.hover:bg-white]="canGoPrev()"
      [class.dark:hover:bg-gray-700]="canGoPrev()"
      [disabled]="!canGoPrev()"
      (click)="prev()"
    >
      <lucide-icon
        name="chevron-left"
        class="w-5 h-5 text-gray-700 dark:text-gray-300"
      ></lucide-icon>
    </button>

    <button
      type="button"
      class="absolute right-2 top-1/2 -translate-y-1/2 z-10 flex items-center justify-center w-10 h-10 rounded-full bg-white/90 dark:bg-gray-800/90 shadow-lg transition-all"
      [class.opacity-50]="!canGoNext()"
      [class.cursor-not-allowed]="!canGoNext()"
      [class.hover:bg-white]="canGoNext()"
      [class.dark:hover:bg-gray-700]="canGoNext()"
      [disabled]="!canGoNext()"
      (click)="next()"
    >
      <lucide-icon
        name="chevron-right"
        class="w-5 h-5 text-gray-700 dark:text-gray-300"
      ></lucide-icon>
    </button>
  }

  <!-- Indicators -->
  @if (showIndicators()) {
    <div class="flex justify-center gap-2 mt-4">
      @for (page of [].constructor(totalPages()); track $index) {
        <button
          type="button"
          class="w-3 h-3 rounded-full transition-all"
          [class.bg-blue-500]="currentPage() === $index"
          [class.bg-gray-300]="currentPage() !== $index"
          [class.dark:bg-gray-600]="currentPage() !== $index"
          [class.scale-125]="currentPage() === $index"
          (click)="setPage($index)"
        ></button>
      }
    </div>
  }
</div>
