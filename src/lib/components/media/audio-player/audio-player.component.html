<div class="flex items-center gap-4 p-4 bg-card border border-border rounded-xl">
  <!-- Cover / Icon -->
  <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0 overflow-hidden">
    @if (coverImage()) {
      <img [src]="coverImage()" class="w-full h-full object-cover" alt="Cover art" />
    } @else {
      <lucide-icon [img]="musicIcon" [size]="20" class="text-primary" />
    }
  </div>

  <!-- Info + controls -->
  <div class="flex-1 min-w-0">
    <p class="text-sm font-medium truncate">{{ title() }}</p>
    @if (artist()) {
      <p class="text-xs text-muted-foreground truncate">{{ artist() }}</p>
    }
    <!-- Progress bar -->
    <div class="mt-2 flex items-center gap-2">
      <span class="text-xs text-muted-foreground w-10 text-right">{{ formatTime(currentTime()) }}</span>
      <div
        class="flex-1 relative h-1.5 bg-muted rounded-full cursor-pointer"
        (click)="seekByClick($event)"
      >
        <div
          class="absolute left-0 top-0 h-full bg-primary rounded-full transition-all"
          [style.width.%]="progress()"
        ></div>
      </div>
      <span class="text-xs text-muted-foreground w-10">{{ formatTime(duration()) }}</span>
    </div>
  </div>

  <!-- Play button -->
  <div class="flex items-center gap-2">
    <button
      (click)="toggleMute()"
      class="p-1.5 rounded hover:bg-accent transition-colors text-muted-foreground hover:text-foreground"
    >
      <lucide-icon [img]="isMuted() ? muteIcon : volumeIcon" [size]="16" />
    </button>
    <button
      (click)="togglePlay()"
      class="w-10 h-10 rounded-full bg-primary text-primary-foreground flex items-center justify-center hover:bg-primary/90 transition-colors"
    >
      <lucide-icon [img]="isPlaying() ? pauseIcon : playIcon" [size]="18" />
    </button>
  </div>

  <audio
    #audioEl
    [src]="src()"
    [autoplay]="autoplay()"
    (timeupdate)="onTimeUpdate()"
    (ended)="onEnded()"
    (loadedmetadata)="onTimeUpdate()"
    class="hidden"
  ></audio>
</div>
