<div class="relative bg-black rounded-xl overflow-hidden group">
  <video
    #videoEl
    [src]="src()"
    [poster]="poster()"
    [autoplay]="autoplay()"
    [loop]="loop()"
    [muted]="muted()"
    class="w-full block"
    (timeupdate)="onTimeUpdate()"
    (ended)="onEnded()"
    (click)="togglePlay()"
  ></video>
  @if (!src()) {
    <div class="flex items-center justify-center h-48 text-white/50 text-sm">
      No video source
    </div>
  }
  @if (controls()) {
    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-3 transition-opacity opacity-0 group-hover:opacity-100">
      <!-- Progress bar -->
      <input
        type="range"
        class="w-full h-1 mb-2 accent-white cursor-pointer"
        [min]="0"
        [max]="duration()"
        [value]="currentTime()"
        step="0.1"
        (input)="seek($event)"
      />
      <!-- Controls row -->
      <div class="flex items-center gap-3">
        <button (click)="togglePlay()" class="text-white hover:text-white/80 transition-colors">
          <lucide-icon [img]="isPlaying() ? pauseIcon : playIcon" [size]="20" />
        </button>
        <button (click)="toggleMute()" class="text-white hover:text-white/80 transition-colors">
          <lucide-icon [img]="isMuted() ? muteIcon : volumeIcon" [size]="18" />
        </button>
        <input
          type="range"
          class="w-16 h-1 accent-white cursor-pointer"
          min="0"
          max="1"
          step="0.05"
          [value]="volume()"
          (input)="setVolume($event)"
        />
        <span class="text-white text-xs ml-auto">
          {{ formatTime(currentTime()) }} / {{ formatTime(duration()) }}
        </span>
      </div>
    </div>
  }
</div>
