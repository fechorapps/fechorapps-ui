<div [class]="variantClasses() + ' rounded-xl p-5'">
  @if (loading()) {
    <div class="animate-pulse space-y-3">
      <div class="h-3 bg-muted rounded w-1/2"></div>
      <div class="h-8 bg-muted rounded w-2/3"></div>
      <div class="h-2 bg-muted rounded w-full mt-4"></div>
    </div>
  } @else {
    <p class="text-sm font-medium text-muted-foreground">{{ label() }}</p>
    <p class="text-2xl font-bold text-card-foreground mt-1">{{ formattedValue() }}</p>
    @if (formattedTarget() !== null) {
      <p class="text-xs text-muted-foreground mt-1">Target: {{ formattedTarget() }}</p>
    }
    @if (progress() !== null) {
      <div class="mt-3">
        <div class="flex justify-between text-xs text-muted-foreground mb-1">
          <span>Progress</span>
          <span>{{ progress()!.toFixed(0) }}%</span>
        </div>
        <div class="w-full bg-muted rounded-full h-1.5">
          <div [class]="progressColor() + ' h-1.5 rounded-full transition-all'" [style.width.%]="progress()"></div>
        </div>
      </div>
    }
  }
</div>
