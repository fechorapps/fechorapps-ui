<div [class]="variantClasses() + ' rounded-xl p-5 relative'">
  @if (loading()) {
    <div class="animate-pulse space-y-3">
      <div class="h-3 bg-muted rounded w-1/2"></div>
      <div class="h-8 bg-muted rounded w-2/3"></div>
      <div class="h-3 bg-muted rounded w-1/3"></div>
    </div>
  } @else {
    <div class="flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-muted-foreground truncate">{{ label() }}</p>
        <p class="text-2xl font-bold text-card-foreground mt-1">{{ value() }}</p>
        @if (trend() || trendValue()) {
          <div [class]="'flex items-center gap-1 mt-2 text-sm ' + trendColorClass()">
            @if (trendIcon()) {
              <lucide-icon [img]="trendIcon()!" [size]="14" />
            }
            @if (trendValue()) {
              <span>{{ trendValue() }}</span>
            }
          </div>
        }
      </div>
      @if (icon()) {
        <div class="ml-3 flex-shrink-0 text-muted-foreground">
          <lucide-icon [img]="icon()!" [size]="20" />
        </div>
      }
    </div>
  }
</div>
