<div class="relative inline-flex" (click)="$event.stopPropagation()">
  <!-- Main button -->
  <button
    type="button"
    [class]="mainButtonClasses()"
    [disabled]="disabled()"
    (click)="onMainClick($event)"
  >
    @if (icon() && iconPos() === 'left') {
      <lucide-icon [img]="icon()!" [size]="iconSize()"></lucide-icon>
    }
    <span>{{ label() }}</span>
    @if (icon() && iconPos() === 'right') {
      <lucide-icon [img]="icon()!" [size]="iconSize()"></lucide-icon>
    }
  </button>

  <!-- Dropdown toggle button -->
  <button
    type="button"
    [class]="dropdownButtonClasses()"
    [disabled]="disabled()"
    [attr.aria-label]="dropdownAriaLabel()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="menu"
    (click)="toggleDropdown($event)"
  >
    <lucide-icon
      [img]="chevronIcon"
      [size]="chevronSize()"
      class="transition-transform duration-200"
      [class.rotate-180]="isOpen()"
    ></lucide-icon>
  </button>

  <!-- Dropdown menu -->
  @if (isOpen()) {
    <div
      #dropdown
      class="absolute top-full right-0 mt-1 min-w-[160px] bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-50 animate-fade-in"
      role="menu"
    >
      @for (item of visibleItems(); track $index) {
        @if (item.separator) {
          <div class="border-t border-gray-200 dark:border-gray-700 my-1"></div>
        } @else {
          <button
            type="button"
            [class]="getItemClasses(item)"
            [disabled]="item.disabled"
            role="menuitem"
            (click)="onMenuItemClick(item, $event)"
          >
            @if (item.icon) {
              <lucide-icon [img]="item.icon" [size]="iconSize()"></lucide-icon>
            }
            <span>{{ item.label }}</span>
          </button>
        }
      }
    </div>
  }
</div>

<style>
  @keyframes fade-in {
    from {
      opacity: 0;
      transform: translateY(-4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in {
    animation: fade-in 0.15s ease-out forwards;
  }
</style>
