<div [class]="containerClasses()">
  <!-- Tab Headers -->
  <div class="flex border-b border-gray-200 dark:border-gray-700" role="tablist">
    @for (panel of panels(); track $index) {
      <button
        type="button"
        role="tab"
        [class]="
          'flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 transition-colors ' +
          (selectedIndex() === $index
            ? 'border-primary-500 text-primary-600 dark:text-primary-400'
            : 'border-transparent text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 hover:border-gray-300') +
          (panel.disabled() ? ' opacity-50 cursor-not-allowed' : ' cursor-pointer') +
          ' ' +
          panel.headerStyleClass()
        "
        [disabled]="panel.disabled()"
        [attr.aria-selected]="selectedIndex() === $index"
        (click)="selectTab($index)"
      >
        @if (panel.leftIcon()) {
          <lucide-icon [img]="panel.leftIcon()!" [size]="16" />
        }
        <span>{{ panel.header() }}</span>
        @if (panel.rightIcon()) {
          <lucide-icon [img]="panel.rightIcon()!" [size]="16" />
        }
      </button>
    }
  </div>

  <!-- Tab Content -->
  <div class="p-4" role="tabpanel">
    @for (panel of panels(); track $index) {
      @if (selectedIndex() === $index) {
        <ng-container [ngTemplateOutlet]="panel.contentTemplate()" />
      }
    }
  </div>
</div>

<ng-template #empty></ng-template>
