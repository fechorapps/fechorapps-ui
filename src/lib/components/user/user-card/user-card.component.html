<div [class]="cardClasses()" (click)="clickable() && cardClicked.emit()">
  <!-- Avatar with status -->
  <div class="relative flex-shrink-0">
    @if (user().avatar) {
      <img [src]="user().avatar" [alt]="user().name" class="w-10 h-10 rounded-full object-cover" />
    } @else {
      <span class="w-10 h-10 rounded-full bg-primary/10 text-primary text-sm font-semibold flex items-center justify-center">
        {{ initials() }}
      </span>
    }
    @if (showStatus()) {
      <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-card" [class]="statusColor()"></span>
    }
  </div>

  <!-- User info -->
  <div class="flex-1 min-w-0">
    <p class="text-sm font-medium truncate">{{ user().name }}</p>
    @if (variant() === 'full') {
      <p class="text-xs text-muted-foreground truncate">{{ user().email }}</p>
      @if (user().role) {
        <p class="text-xs text-primary truncate">{{ user().role }}</p>
      }
    }
  </div>
</div>
