<div class="flex flex-col gap-1" (click)="$event.stopPropagation()">
  @if (label()) {
    <label class="text-sm font-medium text-foreground">{{ label() }}</label>
  }
  <div class="relative flex border border-border rounded-md overflow-visible bg-card">
    <!-- Country selector button -->
    <button
      type="button"
      (click)="toggleDropdown()"
      [disabled]="disabled()"
      class="flex items-center gap-1 px-3 py-2 border-r border-border hover:bg-accent transition-colors disabled:opacity-50 disabled:cursor-not-allowed shrink-0"
      aria-haspopup="listbox"
      [attr.aria-expanded]="showDropdown()"
    >
      <span class="text-base leading-none">{{ selectedCountry().flag }}</span>
      <span class="text-sm text-muted-foreground">{{ selectedCountry().dialCode }}</span>
      <svg class="w-3 h-3 text-muted-foreground ml-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    <!-- Dropdown overlay -->
    @if (showDropdown()) {
      <div
        class="absolute left-0 top-full z-50 mt-1 bg-card border border-border rounded-md shadow-lg max-h-60 overflow-y-auto min-w-[220px]"
        role="listbox"
      >
        @for (country of filteredCountries(); track country.code) {
          <button
            type="button"
            (click)="selectCountry(country)"
            class="flex items-center gap-2 w-full px-3 py-2 hover:bg-accent text-sm transition-colors"
            [class.bg-accent]="country.code === selectedCountry().code"
            role="option"
            [attr.aria-selected]="country.code === selectedCountry().code"
          >
            <span class="text-base leading-none">{{ country.flag }}</span>
            <span class="text-foreground">{{ country.name }}</span>
            <span class="text-muted-foreground ml-auto">{{ country.dialCode }}</span>
          </button>
        }
      </div>
    }

    <!-- Number input -->
    <input
      type="tel"
      [value]="rawDigits()"
      (input)="onInput($event)"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      (blur)="closeDropdown()"
      class="flex-1 px-3 py-2 bg-transparent outline-none text-foreground text-sm placeholder:text-muted-foreground disabled:opacity-50 disabled:cursor-not-allowed"
      autocomplete="tel"
    />
  </div>

  @if (rawDigits() && !isValid()) {
    <span class="text-xs text-red-500">Invalid phone number</span>
  }
</div>
