<!-- ======================================================================
     Step indicator bar
     ====================================================================== -->
<div [class]="indicatorWrapperClasses()">
  @for (step of steps(); track $index) {
    <div
      [class]="
        orientation() === 'horizontal'
          ? 'flex items-center flex-1 min-w-0'
          : 'flex items-start gap-3 py-2'
      "
    >
      <!-- Step button -->
      <button
        type="button"
        (click)="goTo($index)"
        [disabled]="linear() && $index > currentStep()"
        class="flex items-center gap-2 p-1 rounded focus:outline-none focus-visible:ring-2 focus-visible:ring-primary disabled:cursor-not-allowed"
        [attr.aria-current]="$index === currentStep() ? 'step' : null"
      >
        <!-- Indicator circle -->
        <span [class]="stepIndicatorClass($index)">
          @if (stepState($index) === 'completed') {
            <lucide-icon [img]="checkIcon" [size]="14" />
          } @else {
            {{ showStepNumbers() ? $index + 1 : '' }}
          }
        </span>

        <!-- Label + description -->
        <span class="flex flex-col items-start text-left">
          <span [class]="stepLabelClass($index)">{{ step.label }}</span>
          @if (step.description) {
            <span class="text-xs text-muted-foreground leading-tight">{{ step.description }}</span>
          }
          @if (step.optional) {
            <span class="text-xs text-muted-foreground italic">Optional</span>
          }
        </span>
      </button>

      <!-- Connector line (not after last item) -->
      @if (!$last) {
        @if (orientation() === 'horizontal') {
          <div class="flex-1 h-px bg-border mx-2 mt-4"></div>
        } @else {
          <div class="w-px h-6 bg-border ml-4 my-1"></div>
        }
      }
    </div>
  }
</div>

<!-- ======================================================================
     Content slot — consumers show/hide children via [hidden] or @if
     ====================================================================== -->
<div class="mt-6">
  <ng-content />
</div>

<!-- ======================================================================
     Navigation buttons
     ====================================================================== -->
<div class="flex items-center justify-between mt-6 pt-4 border-t border-border">
  <!-- Back -->
  <button
    type="button"
    (click)="back()"
    [disabled]="currentStep() === 0"
    class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-md border border-border bg-card text-foreground hover:bg-accent transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
  >
    {{ backLabel() }}
  </button>

  <!-- Right side: Skip + Next/Finish -->
  <div class="flex items-center gap-2">
    @if (steps()[currentStep()]?.optional) {
      <button
        type="button"
        (click)="skip()"
        class="inline-flex items-center px-4 py-2 text-sm font-medium rounded-md border border-border bg-card text-muted-foreground hover:bg-accent transition-colors"
      >
        Skip
      </button>
    }

    <button
      type="button"
      (click)="next()"
      [disabled]="!canNext()"
      class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-md bg-primary text-primary-foreground hover:opacity-90 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed"
    >
      {{ isLastStep() ? finishLabel() : nextLabel() }}
    </button>
  </div>
</div>
