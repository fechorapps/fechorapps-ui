<div class="flex flex-col gap-3 w-full">

  <!-- Card Number Field -->
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-foreground">Card Number</label>
    <div class="relative flex items-center border border-border rounded-md bg-card overflow-hidden"
         [class.opacity-50]="disabled()"
         [class.cursor-not-allowed]="disabled()">

      <!-- Card Type Icon -->
      @if (showCardIcon()) {
        <div class="flex items-center justify-center w-12 h-10 shrink-0 border-r border-border px-2">
          @switch (cardType()) {
            @case ('visa') {
              <!-- Visa: blue background, white VISA text -->
              <svg viewBox="0 0 48 32" class="w-8 h-5" aria-label="Visa">
                <rect width="48" height="32" rx="4" fill="#1A1F71"/>
                <text x="24" y="22" font-family="Arial,sans-serif" font-size="14" font-weight="bold"
                      fill="white" text-anchor="middle" letter-spacing="1">VISA</text>
              </svg>
            }
            @case ('mastercard') {
              <!-- Mastercard: two overlapping circles -->
              <svg viewBox="0 0 48 32" class="w-8 h-5" aria-label="Mastercard">
                <rect width="48" height="32" rx="4" fill="#252525"/>
                <circle cx="18" cy="16" r="10" fill="#EB001B"/>
                <circle cx="30" cy="16" r="10" fill="#F79E1B"/>
                <path d="M24 8.4a10 10 0 0 1 0 15.2A10 10 0 0 1 24 8.4z" fill="#FF5F00"/>
              </svg>
            }
            @case ('amex') {
              <!-- Amex: blue background, white AMEX text -->
              <svg viewBox="0 0 48 32" class="w-8 h-5" aria-label="American Express">
                <rect width="48" height="32" rx="4" fill="#2E77BC"/>
                <text x="24" y="14" font-family="Arial,sans-serif" font-size="8" font-weight="bold"
                      fill="white" text-anchor="middle">AMERICAN</text>
                <text x="24" y="24" font-family="Arial,sans-serif" font-size="8" font-weight="bold"
                      fill="white" text-anchor="middle">EXPRESS</text>
              </svg>
            }
            @case ('discover') {
              <!-- Discover: white background, orange circle -->
              <svg viewBox="0 0 48 32" class="w-8 h-5" aria-label="Discover">
                <rect width="48" height="32" rx="4" fill="#F5F5F5"/>
                <text x="10" y="21" font-family="Arial,sans-serif" font-size="8" font-weight="bold"
                      fill="#231F20" text-anchor="start">DISCOVER</text>
                <circle cx="38" cy="16" r="10" fill="#F76F20"/>
              </svg>
            }
            @default {
              <!-- Unknown: generic card icon -->
              <svg viewBox="0 0 24 16" class="w-8 h-5 text-muted-foreground" fill="none" stroke="currentColor" stroke-width="1.5" aria-label="Card">
                <rect x="0.75" y="0.75" width="22.5" height="14.5" rx="2.25" />
                <path d="M0 5h24" />
                <rect x="2" y="8" width="4" height="2" rx="0.5" fill="currentColor" stroke="none"/>
              </svg>
            }
          }
        </div>
      }

      <!-- Number Input -->
      <input
        type="text"
        inputmode="numeric"
        [value]="numberInput()"
        (input)="onNumberInput($event)"
        [disabled]="disabled()"
        [maxlength]="numberMaxLength()"
        placeholder="0000 0000 0000 0000"
        autocomplete="cc-number"
        class="flex-1 px-3 py-2 bg-transparent outline-none text-foreground text-sm placeholder:text-muted-foreground disabled:cursor-not-allowed font-mono tracking-wider"
      />
    </div>
  </div>

  <!-- Expiry + CVV Row -->
  <div class="flex gap-3">

    <!-- Expiry Field -->
    <div class="flex flex-col gap-1 flex-1">
      <label class="text-sm font-medium text-foreground">Expiry</label>
      <input
        type="text"
        inputmode="numeric"
        [value]="expiryInput()"
        (input)="onExpiryInput($event)"
        [disabled]="disabled()"
        maxlength="5"
        placeholder="MM/YY"
        autocomplete="cc-exp"
        class="w-full px-3 py-2 border border-border rounded-md bg-card outline-none text-foreground text-sm placeholder:text-muted-foreground disabled:opacity-50 disabled:cursor-not-allowed font-mono"
      />
    </div>

    <!-- CVV Field -->
    @if (showCvv()) {
      <div class="flex flex-col gap-1 flex-1">
        <label class="text-sm font-medium text-foreground">CVV</label>
        <div class="relative flex items-center border border-border rounded-md bg-card overflow-hidden"
             [class.opacity-50]="disabled()">
          <input
            [type]="showCvvText() ? 'text' : 'password'"
            inputmode="numeric"
            [value]="cvvInput()"
            (input)="onCvvInput($event)"
            [disabled]="disabled()"
            [maxlength]="cvvMaxLength()"
            [placeholder]="isAmex() ? '0000' : '000'"
            autocomplete="cc-csc"
            class="flex-1 px-3 py-2 bg-transparent outline-none text-foreground text-sm placeholder:text-muted-foreground disabled:cursor-not-allowed font-mono"
          />
          <!-- Toggle CVV visibility -->
          <button
            type="button"
            (click)="toggleCvvVisibility()"
            [disabled]="disabled()"
            class="flex items-center justify-center px-2 py-2 text-muted-foreground hover:text-foreground transition-colors disabled:cursor-not-allowed"
            [attr.aria-label]="showCvvText() ? 'Hide CVV' : 'Show CVV'"
          >
            @if (showCvvText()) {
              <!-- Eye-off icon -->
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            } @else {
              <!-- Eye icon -->
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            }
          </button>
        </div>
      </div>
    }
  </div>

  <!-- Validity indicator -->
  @if (numberInput() && isValid()) {
    <div class="flex items-center gap-1.5 text-xs text-green-600">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
      <span>Card details look good</span>
    </div>
  }
</div>
