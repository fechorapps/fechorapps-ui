<div class="flex flex-col">
  <label
    class="inline-flex items-center"
    [class.cursor-pointer]="!disabled()"
    [class.cursor-not-allowed]="disabled()"
  >
    <!-- Hidden native checkbox for accessibility -->
    <input
      type="checkbox"
      class="sr-only"
      [name]="name()"
      [id]="inputId()"
      [checked]="checked()"
      [disabled]="disabled()"
      [attr.aria-checked]="indeterminate() ? 'mixed' : checked()"
      [attr.aria-invalid]="invalid()"
      (change)="toggle()"
      (keydown)="onKeydown($event)"
    />

    <!-- Custom checkbox box -->
    <span
      [class]="boxClasses()"
      role="checkbox"
      [attr.aria-checked]="indeterminate() ? 'mixed' : checked()"
      (click)="toggle()"
    >
      @if (indeterminate()) {
        <lucide-icon [img]="minusIcon" [size]="iconSize()" class="text-white"></lucide-icon>
      } @else if (checked()) {
        <lucide-icon [img]="checkIcon" [size]="iconSize()" class="text-white"></lucide-icon>
      }
    </span>

    <!-- Label -->
    @if (label()) {
      <span [class]="labelClasses()">{{ label() }}</span>
    }
    <ng-content></ng-content>
  </label>

  <!-- Help text -->
  @if (helpText()) {
    <span
      class="text-xs mt-1 ml-7"
      [class.text-gray-500]="!invalid()"
      [class.dark:text-gray-400]="!invalid()"
      [class.text-red-500]="invalid()"
      [class.dark:text-red-400]="invalid()"
    >
      {{ helpText() }}
    </span>
  }
</div>
