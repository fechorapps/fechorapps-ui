<div class="inline-block">
  <div
    class="border-2 border-dashed border-border rounded-xl overflow-hidden relative"
    [class.opacity-50]="disabled()"
  >
    <canvas
      #canvas
      [width]="width()"
      [height]="height()"
      class="block touch-none cursor-crosshair"
      (mousedown)="startDrawing($event)"
      (mousemove)="draw($event)"
      (mouseup)="stopDrawing()"
      (mouseleave)="stopDrawing()"
      (touchstart)="startDrawing($event)"
      (touchmove)="draw($event)"
      (touchend)="stopDrawing()"
    ></canvas>
    @if (isEmpty()) {
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <p class="text-muted-foreground text-sm">{{ placeholder() }}</p>
      </div>
    }
  </div>
  <div class="flex items-center justify-between mt-2">
    <button
      (click)="clear()"
      [disabled]="isEmpty()"
      class="flex items-center gap-1.5 text-xs text-muted-foreground hover:text-foreground disabled:opacity-40 transition-colors"
    >
      <lucide-icon [img]="trashIcon" [size]="14" />
      Clear
    </button>
    <button
      (click)="download()"
      [disabled]="isEmpty()"
      class="flex items-center gap-1.5 text-xs text-muted-foreground hover:text-foreground disabled:opacity-40 transition-colors"
    >
      <lucide-icon [img]="downloadIcon" [size]="14" />
      Download
    </button>
  </div>
</div>
