<div [class]="wrapperClasses()">
  <!-- Label -->
  @if (label()) {
    <label [for]="inputId()" [class]="labelClasses()">
      {{ label() }}
    </label>
  }

  <!-- Input container -->
  <div [class]="containerClasses()">
    <!-- Input -->
    <input
      [type]="inputType()"
      [class]="inputClasses()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [value]="value()"
      [name]="name()"
      [id]="inputId()"
      [attr.aria-invalid]="invalid()"
      [attr.aria-describedby]="helpText() ? inputId() + '-help' : null"
      autocomplete="current-password"
      (input)="handleInput($event)"
      (focus)="handleFocus($event)"
      (blur)="handleBlur($event)"
    />

    <!-- Toggle button -->
    @if (toggleable()) {
      <button
        type="button"
        [class]="toggleButtonClasses()"
        [disabled]="disabled()"
        [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
        (click)="toggleVisibility()"
      >
        <lucide-icon
          [img]="passwordVisible() ? eyeOffIcon : eyeIcon"
          [size]="iconSize()"
        ></lucide-icon>
      </button>
    }
  </div>

  <!-- Strength meter -->
  @if (showStrength() && value()) {
    <div class="mt-2">
      <!-- Strength bar -->
      <div class="h-1 w-full bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
        <div
          class="h-full transition-all duration-300 rounded-full"
          [class]="strengthColor()"
          [style.width.%]="strengthPercentage()"
        ></div>
      </div>

      <!-- Strength label -->
      @if (feedback()) {
        <p class="text-xs mt-1" [class]="strengthColor().replace('bg-', 'text-')">
          {{ strengthLabel() }}
        </p>
      }
    </div>
  }

  <!-- Help text -->
  @if (helpText()) {
    <p [id]="inputId() + '-help'" [class]="helpTextClasses()">
      {{ helpText() }}
    </p>
  }
</div>
