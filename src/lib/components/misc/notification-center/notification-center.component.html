<div class="relative inline-block">
  <!-- Bell button -->
  <button
    (click)="toggle()"
    class="relative p-2 rounded-full hover:bg-accent transition-colors"
    aria-label="Toggle notifications"
  >
    <lucide-icon [img]="bellIcon" [size]="20" />
    @if (unreadCount() > 0) {
      <span
        class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs flex items-center justify-center rounded-full font-medium"
      >
        {{ unreadCount() > 9 ? '9+' : unreadCount() }}
      </span>
    }
  </button>

  <!-- Popover panel -->
  @if (open()) {
    <div
      class="absolute right-0 w-80 bg-popover border border-border rounded-xl shadow-lg z-50"
      [class]="panelPlacementClass()"
    >
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b border-border">
        <h3 class="font-semibold text-sm">Notifications</h3>
        @if (unreadCount() > 0) {
          <button
            (click)="markAllRead()"
            class="text-xs text-primary hover:underline transition-colors"
          >
            Mark all read
          </button>
        }
      </div>

      <!-- List -->
      <div class="divide-y divide-border max-h-96 overflow-y-auto">
        @for (notification of visibleNotifications(); track notification.id) {
          <div
            class="p-4 flex gap-3 transition-colors cursor-pointer hover:bg-accent/50"
            [class.bg-primary/5]="!notification.read"
            (click)="markRead(notification.id)"
          >
            <!-- Type icon -->
            <div class="shrink-0 mt-0.5">
              <lucide-icon
                [img]="notification.icon ?? getTypeIcon(notification.type)"
                [size]="16"
                [class]="getTypeIconClass(notification.type)"
              />
            </div>

            <!-- Content -->
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium leading-tight" [class.font-semibold]="!notification.read">
                {{ notification.title }}
              </p>
              <p class="text-xs text-muted-foreground mt-0.5 leading-snug">{{ notification.message }}</p>
            </div>

            <!-- Dismiss -->
            <button
              (click)="$event.stopPropagation(); dismiss(notification.id)"
              class="text-muted-foreground hover:text-foreground transition-colors shrink-0 mt-0.5"
              aria-label="Dismiss notification"
            >
              <lucide-icon [img]="xIcon" [size]="14" />
            </button>
          </div>
        } @empty {
          <p class="text-center text-muted-foreground text-sm py-6">No notifications</p>
        }
      </div>
    </div>
  }
</div>
