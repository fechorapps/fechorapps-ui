<div [class]="containerClasses()">
  <!-- Header -->
  <div class="flex items-center gap-2 px-4 py-2 bg-gray-800 border-b border-gray-700">
    <div class="flex gap-1.5">
      <span class="w-3 h-3 rounded-full bg-red-500"></span>
      <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
      <span class="w-3 h-3 rounded-full bg-green-500"></span>
    </div>
    <span class="text-gray-400 text-xs ml-2">Terminal</span>
  </div>

  <!-- Content -->
  <div #terminalContent class="flex-1 p-4 overflow-auto min-h-48 max-h-96">
    <!-- Welcome Message -->
    @if (welcomeMessage()) {
      <div class="mb-4 text-gray-400">{{ welcomeMessage() }}</div>
    }

    <!-- Command History -->
    @for (cmd of commands(); track $index) {
      <div class="mb-2">
        <div class="flex items-center gap-2">
          <span class="text-blue-400">{{ prompt() }}</span>
          <span>{{ cmd.command }}</span>
        </div>
        @if (cmd.response) {
          <div class="mt-1 text-gray-300 whitespace-pre-wrap">{{ cmd.response }}</div>
        }
      </div>
    }

    <!-- Current Input Line -->
    <div class="flex items-center gap-2">
      <span class="text-blue-400">{{ prompt() }}</span>
      <input
        type="text"
        class="flex-1 bg-transparent border-none outline-none text-green-400 caret-green-400"
        [ngModel]="currentInput()"
        (ngModelChange)="currentInput.set($event)"
        (keydown)="handleKeydown($event)"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
  </div>
</div>
