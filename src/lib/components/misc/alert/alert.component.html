@if (visible()) {
  <div [class]="containerClasses()" [class.rounded-none]="banner()">
    <div class="flex gap-3 p-4">
      <!-- Icon -->
      <lucide-icon [img]="icon() ?? defaultIcon()" [size]="18" class="flex-shrink-0 mt-0.5" />
      <!-- Content -->
      <div class="flex-1">
        @if (title()) {
          <p class="font-semibold text-sm mb-1">{{ title() }}</p>
        }
        <div class="text-sm"><ng-content /></div>
      </div>
      <!-- Dismiss button -->
      @if (dismissible()) {
        <button (click)="dismiss()" class="flex-shrink-0 -mt-1 -mr-1 p-1 rounded hover:opacity-70">
          <lucide-icon [img]="xIcon" [size]="16" />
        </button>
      }
    </div>
  </div>
}
