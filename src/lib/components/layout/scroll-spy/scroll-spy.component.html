<nav [class]="navClasses()" aria-label="Scroll spy navigation">
  @for (item of items(); track item.id) {
    <button
      type="button"
      [class]="itemClasses(item.id)"
      [attr.aria-current]="isActive(item.id) ? 'location' : null"
      (click)="scrollTo(item.id)"
    >
      @if (item.icon) {
        <lucide-icon [img]="item.icon" [size]="16" class="flex-shrink-0" />
      }
      <span>{{ item.label }}</span>
    </button>
  }
</nav>
