<div class="flex h-screen overflow-hidden bg-background">
  <!-- Sidebar -->
  <aside
    class="flex-shrink-0 bg-card border-r border-border overflow-hidden transition-all duration-300 ease-in-out hidden sm:block"
    [style.width]="sidebarCollapsed() ? sidebarCollapsedWidth() : sidebarWidth()"
  >
    <ng-content select="[sidebar]" />
  </aside>

  <!-- Mobile overlay sidebar -->
  @if (!sidebarCollapsed()) {
    <aside
      class="fixed inset-y-0 left-0 z-50 bg-card border-r border-border overflow-hidden sm:hidden"
      [style.width]="sidebarWidth()"
    >
      <ng-content select="[sidebar]" />
    </aside>
    <div
      class="fixed inset-0 z-40 bg-black/50 sm:hidden"
      (click)="sidebarCollapsed.set(true)"
    ></div>
  }

  <!-- Main area -->
  <div class="flex flex-col flex-1 overflow-hidden min-w-0">
    @if (showHeader()) {
      <header
        class="flex-shrink-0 bg-card border-b border-border flex items-center px-4"
        [style.height]="headerHeight()"
      >
        <ng-content select="[header]" />
      </header>
    }
    <main class="flex-1 overflow-auto">
      <ng-content select="[content]" />
    </main>
    <footer class="flex-shrink-0 bg-card border-t border-border">
      <ng-content select="[footer]" />
    </footer>
  </div>
</div>
